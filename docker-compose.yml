services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_video_studio
      POSTGRES_USER: ai_video_studio
      POSTGRES_PASSWORD: ai_video_studio_change_me
    volumes:
      - backend-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_video_studio -d ai_video_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend-projects:/data/projects
    restart: unless-stopped

volumes:
  backend-projects:
  backend-postgres:
